<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ajuda ao Migrante</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Encontre apoio perto de você</h1>

  <div class="filtros">
    <input type="text" id="cidade" placeholder="Digite sua cidade">

    <select id="tipo">
      <option value="">Selecione o tipo de ajuda</option>
      <option value="documentacao">Documentação</option>
      <option value="abrigo">Abrigo</option>
      <option value="trabalho">Trabalho</option>
      <option value="saude">Saúde</option>
      <option value="cursos">Cursos</option>
      <option value="servico social">Serviço Social</option>
    </select>

    <button onclick="buscarLocais()">Buscar</button>
  </div>

  <div id="resultados"></div>

  <script src="script.js"></script>
</body>
</html>
